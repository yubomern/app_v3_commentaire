# scenario.cfg — Crash Simulator Scenario Configuration
# Used by: crash_simulator --config scenario.cfg
# Objective 1: eliminates direct CLI flags for crash type.
# All crash selection is random; only pipeline parameters are set here.

# Number of crashes to generate per run
crash_count=10

# Intensity level 1-10 (affects recursion depth, memory pressure, etc.)
intensity=7

# Logging to stdout
logging=true

# Output directory for CSV and coredumps
output_dir=simulator_output

# CSV filename (relative to output_dir)
output_csv=crash_report.csv

# Milliseconds to wait between crashes in a multi-run
delay_ms=300
